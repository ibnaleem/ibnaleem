name: Metrics

on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: leetcode-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          base: ""

          plugin_leetcode: yes
          plugin_leetcode_user: ibnaleem

          plugin_leetcode_sections: solved,skills,recent

          plugin_leetcode_limit_skills: 0
          plugin_leetcode_limit_recent: 3
